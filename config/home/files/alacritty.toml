# Colors (Zenburn)
# Orginally designed by jnurmine for vim.

# Default colors
[colors.primary]
background = '#3f3f3f'
foreground = '#dcdccc'

# Normal colors
[colors.normal]
black   = '#3f3f3f'
red     = '#cc9393'
green   = '#7f9f7f'
yellow  = '#d0bf8f'
blue    = '#6ca0a3'
magenta = '#dc8cc3'
cyan    = '#93e0e3'
white   = '#dcdccc'

# Bright colors
[colors.bright]
black   = '#000000'
red     = '#dca3a3'
green   = '#bfebbf'
yellow  = '#f0dfaf'
blue    = '#8cd0d3'
magenta = '#dc8cc3'
cyan    = '#93e0e3'
white   = '#ffffff'

[env]
TERM = "alacritty"

[window]
decorations_theme_variant = "None"
opacity = 0.8
dynamic_title = true
class.instance = "Alacritty"
class.general = "Alacritty"

[scrolling]
history = 10000

[terminal]
shell = {program = "/home/dad/.guix-home/profile/bin/bash", args = ["--login"]}

[font]
size = 9
